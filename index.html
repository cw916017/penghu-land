<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澎湖農變建試算助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: sans-serif; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .status-pass { color: #065f46; background: #ecfdf5; border: 1px solid #a7f3d0; }
        .status-fail { color: #991b1b; background: #fef2f2; border: 1px solid #fecaca; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-2xl mx-auto space-y-6">
        <div class="bg-slate-700 p-6 rounded-2xl text-white shadow-md">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="fas fa-calculator"></i> 澎湖農變建試算助手
            </h1>
            <p class="text-slate-300 text-xs mt-1">依據澎湖縣農地變更編定審查要點計算</p>
        </div>

        <div class="card p-6">
            <h2 class="text-md font-bold mb-4 text-slate-800 border-b pb-2">土地基本資料</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600">土地總坪數 (農地)</label>
                    <input type="number" id="totalArea" placeholder="輸入坪數" oninput="calculate()" class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-400">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600">使用分區</label>
                    <select id="zoneType" onchange="calculate()" class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-400">
                        <option value="general">一般農業區 (農牧用地)</option>
                        <option value="special">特定農業區 (特農)</option>
                        <option value="other">其他 / 都市計畫區內</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card p-6">
            <h2 class="text-md font-bold mb-4 text-slate-800 border-b pb-2">申請人資格確認</h2>
            <div class="space-y-2">
                <label class="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-50 cursor-pointer">
                    <input type="checkbox" id="checkResident" onchange="calculate()" class="w-4 h-4 accent-slate-700">
                    <span class="text-sm text-gray-600">本人(或直系血親)設籍澎湖滿 2 年</span>
                </label>
                <label class="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-50 cursor-pointer">
                    <input type="checkbox" id="checkNoHouse" onchange="calculate()" class="w-4 h-4 accent-slate-700">
                    <span class="text-sm text-gray-600">本人名下於澎湖無住宅或建築用地</span>
                </label>
                <label class="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-50 cursor-pointer">
                    <input type="checkbox" id="checkFirstTime" onchange="calculate()" class="w-4 h-4 accent-slate-700">
                    <span class="text-sm text-gray-600">此為一生第一次申請農變建</span>
                </label>
            </div>
        </div>

        <div id="resultBox" class="card p-6 hidden">
            <h2 class="text-md font-bold mb-4 text-slate-800 border-b pb-2">試算結果</h2>
            
            <div id="statusLight" class="p-3 rounded-xl mb-6 text-center text-sm font-medium">
                讀取中...
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="p-4 bg-gray-50 rounded-xl border border-gray-100">
                    <span class="text-xs text-gray-500 block">可變更建地上限</span>
                    <span class="text-lg font-bold text-slate-700" id="constLimit">0 坪</span>
                </div>
                <div class="p-4 bg-gray-50 rounded-xl border border-gray-100">
                    <span class="text-xs text-gray-500 block">剩餘農地面積</span>
                    <span class="text-lg font-bold text-slate-700" id="remainFarm">0 坪</span>
                </div>
                <div class="p-4 bg-slate-50 rounded-xl border border-slate-100">
                    <span class="text-xs text-slate-500 block">最大一樓面積 (60%)</span>
                    <span class="text-lg font-bold text-slate-700" id="maxFloor">0 坪</span>
                </div>
                <div class="p-4 bg-slate-50 rounded-xl border border-slate-100">
                    <span class="text-xs text-slate-500 block">最大總樓地板 (180%)</span>
                    <span class="text-lg font-bold text-slate-700" id="maxTotal">0 坪</span>
                </div>
            </div>

            <div class="text-xs space-y-2 text-gray-600 bg-amber-50 p-4 rounded-xl border border-amber-100">
                <p class="font-bold text-amber-900"><i class="fas fa-info-circle"></i> 重要法規提醒：</p>
                <ul class="list-disc ml-5 space-y-1">
                    <li><strong>樓層高度：</strong> 限制最高 3 層樓 (不得超過 10.5 公尺)。</li>
                    <li><strong>移轉限制：</strong> 領得使照後，<strong>5 年內</strong>不得買賣或贈與。</li>
                    <li><strong>隔離帶：</strong> 基地邊界需依規留設約 1.5 公尺隔離綠帶。</li>
                    <li><strong>臨路條件：</strong> 須臨既成道路，若無則須自留至少 4 公尺寬通路。</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        function calculate() {
            const totalArea = parseFloat(document.getElementById('totalArea').value) || 0;
            const zoneType = document.getElementById('zoneType').value;
            const isResident = document.getElementById('checkResident').checked;
            const isNoHouse = document.getElementById('checkNoHouse').checked;
            const isFirst = document.getElementById('checkFirstTime').checked;
            
            const resultBox = document.getElementById('resultBox');
            if(totalArea > 0) resultBox.classList.remove('hidden');

            const constLimit = Math.min(totalArea, 100);
            const remainFarm = totalArea - constLimit;
            const maxFloor = (constLimit * 0.6).toFixed(1);
            const maxTotal = (constLimit * 1.8).toFixed(1);

            document.getElementById('constLimit').innerText = constLimit + ' 坪';
            document.getElementById('remainFarm').innerText = remainFarm + ' 坪';
            document.getElementById('maxFloor').innerText = maxFloor + ' 坪';
            document.getElementById('maxTotal').innerText = maxTotal + ' 坪';

            const statusLight = document.getElementById('statusLight');
            let pass = true;
            let msg = "初步評估：基本條件符合。";

            if (zoneType === 'special') { pass = false; msg = "不符合：特定農業區目前原則不開放。"; }
            else if (!isResident || !isNoHouse || !isFirst) { pass = false; msg = "需注意：申請人身分資格尚未齊全。"; }
            else if (totalArea < 50) { pass = false; msg = "需注意：農地坪數較小，開發效益有限。"; }

            statusLight.className = `p-3 rounded-xl mb-6 text-center text-sm font-medium ${pass ? 'status-pass' : 'status-fail'}`;
            statusLight.innerText = msg;
        }
    </script>
</body>
</html>
